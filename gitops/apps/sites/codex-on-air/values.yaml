image:
  repository: ghcr.io/gd-arnold/music-visualizer
  tag: "d38a497"

imagePullSecrets:
  - name: ghcr-pull

command:
  - npm
  - run
  - start:api

serviceAccount:
  create: true
  name: codex-on-air

service:
  type: ClusterIP
  port: 8787

ingress:
  enabled: true
  className: traefik
  annotations: {}
  hosts:
    - host: codexonair.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

persistence:
  generated:
    enabled: true
    size: 30Gi
  codexHome:
    enabled: true
    size: 1Gi

codexAuthSeed:
  enabled: true
  secretName: codex-on-air-codex-auth-seed
  secretKey: auth.json

env:
  - name: NODE_ENV
    value: production
  - name: HOST
    value: 0.0.0.0
  - name: PORT
    value: "8787"
  - name: GENERATED_DIR
    value: /app/generated
  - name: CODEX_HOME
    value: /home/node/.codex
  - name: CODEX_RESEARCH_WEB_SEARCH
    value: cached
  - name: CODEX_RESEARCH_REASONING_EFFORT
    value: medium
  - name: CODEX_RESEARCH_TIMEOUT_MS
    value: "180000"
  - name: CODEX_GENERATION_REASONING_EFFORT
    value: low
  - name: CODEX_GENERATION_TIMEOUT_MS
    value: "720000"
  - name: CODEX_GENERATION_SERVICE_TIER
    value: fast
  - name: CODEX_RESEARCH_SERVICE_TIER
    value: fast
  - name: HTTPS_REDIRECT_HOSTS
    value: codexonair.com
  - name: MAX_ACTIVE_PREPARATIONS
    value: "1"
  - name: MAX_ACTIVE_REQUESTS_PER_SESSION
    value: "10"
  - name: MAX_ROOM_QUEUE_LENGTH
    value: "200"
  - name: DATABASE_POOL_MAX
    value: "3"
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: codex-on-air-db-app
        key: DATABASE_URL

worker:
  enabled: true
  replicaCount: 8
  codexHome:
    persistence:
      enabled: false
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 3Gi
  env:
    - name: WORKER_POLL_INTERVAL_MS
      value: "5000"
